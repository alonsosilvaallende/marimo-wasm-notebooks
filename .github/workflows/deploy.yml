name: Build and Deploy marimo-wasm notebooks

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  UV_SYSTEM_PYTHON: 1

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout
            uses: actions/checkout@v6

          - name: 🚀 Install uv
            uses: astral-sh/setup-uv@v7
    
          - name: 📄 Export notebooks
            run: |
                # Define the notebooks to export
                files=("batch_and_form.py" "data_explorer.py" "notebook.py")
                
                # Export each notebook to the same output directory
                for file in "${files[@]}"; do
                  echo "Exporting $file..."
                  uvx marimo export html-wasm "$file" -o path/to/output --mode edit
                done
 
          - name: 📦 Upload Pages Artifact
            uses: actions/upload-pages-artifact@v3
            with:
                path: path/to/output

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        permissions:
            pages: write
            id-token: write

        steps:
            - name: 🌐 Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
              with:
                  artifact_name: github-pages
