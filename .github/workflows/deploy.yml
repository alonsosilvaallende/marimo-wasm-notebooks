name: Build and Deploy marimo-wasm notebooks

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

env:
  UV_SYSTEM_PYTHON: 1

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
          - name: Checkout
            uses: actions/checkout@v6

          - name: 🚀 Install uv
            uses: astral-sh/setup-uv@v7
    
          - name: 📄 Export notebooks
            run: |
                # Export each notebook to the same output directory
                mkdir -p path/to/output
                      # Create index.html
                cat > path/to/output/index.html << 'EOF'
                <!DOCTYPE html>
                <html>
                <head><title>My Notebooks</title></head>
                <body>
                  <h1>Available Notebooks</h1>
                  <ul>
                EOF
                for file in notebooks/*.py; do
                  basename=$(basename "$file" .py)
                  echo "Exporting $file to ${basename}.html..."
                  uvx marimo export html-wasm "$file" -o "path/to/output/${basename}.html" --mode edit
                  echo "<li><a href='${basename}.html'>${basename}</a></li>" >> path/to/output/index.html
                done

                echo "</ul><h1>Available Apps</h1><ul>" >> path/to/output/index.html
                for file in apps/*.py; do
                  basename=$(basename "$file" .py)
                  echo "Exporting $file to ${basename}.html..."
                  uvx marimo export html-wasm "$file" -o "path/to/output/${basename}.html" --mode run
                  echo "<li><a href='${basename}.html'>${basename}</a></li>" >> path/to/output/index.html
                done
                echo "</ul></body></html>" >> path/to/output/index.html

 
          - name: 📦 Upload Pages Artifact
            uses: actions/upload-pages-artifact@v3
            with:
                path: path/to/output

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        permissions:
            pages: write
            id-token: write

        steps:
            - name: 🌐 Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
              with:
                  artifact_name: github-pages
